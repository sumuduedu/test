{% extends 'base.html' %}
{% block content %}
<h1 class="h3 mb-3">Create Course</h1>
<form method="post" class="row g-3">
  <div class="col-md-6">
    <label class="form-label">Course name</label>
    <input type="text" name="name" class="form-control" required>
  </div>
  <div class="col-md-3">
    <label class="form-label">Duration (months)</label>
    <input type="number" name="duration_months" class="form-control" min="1" value="3" required>
  </div>
  <div class="col-md-3">
    <label class="form-label">Days per week</label>
    <input type="number" name="days_per_week" class="form-control" min="1" max="7" value="5" required>
  </div>
  <div class="col-md-3">
    <label class="form-label">Hours per day</label>
    <input type="number" step="0.5" name="hours_per_day" class="form-control" min="1" value="3" required>
  </div>
  <div class="col-md-3">
    <label class="form-label">Theory %</label>
    <input type="number" name="theory_percentage" class="form-control" min="10" max="90" value="60" required>
  </div>
  <div class="col-12">
    <button class="btn btn-primary" type="submit">Generate Plan</button>
    <a class="btn btn-secondary" href="{{ url_for('index') }}">Cancel</a>
  </div>
</form>
{% endblock %}
