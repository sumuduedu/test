<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CBT-TMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">CBT-TMS</a>
    <div class="navbar-nav">
      <a class="nav-link" href="/accounts/dashboard/">Dashboard</a>
      <a class="nav-link" href="/courses/">Courses</a>
      <a class="nav-link" href="/batches/">Batches</a>
      <a class="nav-link" href="/assessment/">Assessment</a>
      <a class="nav-link" href="/evaluation/performance/">Analytics</a>
    </div>
    <div class="ms-auto text-light">
      {% if user.is_authenticated %}{{ user.username }} | <a class="text-light" href="/accounts/logout/">Logout</a>{% else %}<a class="text-light" href="/accounts/login/">Login</a>{% endif %}
    </div>
  </div>
</nav>
<div class="container py-4">
  {% if messages %}
    {% for message in messages %}<div class="alert alert-info">{{ message }}</div>{% endfor %}
  {% endif %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
