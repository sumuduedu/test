{% extends 'accounts/base_auth.html' %}{% block content %}<div class='glass-card w-full max-w-md rounded-2xl shadow-2xl p-8 border border-white/30'><h1 class='text-white text-3xl font-bold mb-2'>Welcome Back</h1><p class='text-indigo-100 mb-6'>Sign in to Training Management System</p>{% if form.errors %}<div class='mb-4 rounded-lg bg-red-100 text-red-700 px-4 py-3'>Invalid credentials or account locked.</div>{% endif %}<form method='post' id='loginForm' class='space-y-4'>{% csrf_token %}<div class='relative'><span class='absolute left-3 top-3'>📧</span>{{ form.username }}</div><div class='relative'><span class='absolute left-3 top-3'>🔒</span>{{ form.password }}<button type='button' onclick="togglePassword('id_password')" class='absolute right-3 top-3 text-xs text-indigo-700'>Show</button></div><button id='loginBtn' class='w-full rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white py-3 font-semibold transition transform hover:scale-[1.02]'>Sign In</button></form><div class='mt-4 flex justify-between text-sm text-white'><a href='{% url "accounts:password-reset" %}' class='underline'>Forgot password?</a><a href='{% url "accounts:register" %}' class='underline'>Register</a></div></div><script>loadingBtn('loginForm','loginBtn')</script>{% endblock %}
