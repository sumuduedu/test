<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<script src='https://cdn.tailwindcss.com'></script><link rel='stylesheet' href='/static/css/accounts.css'><title>TMS Accounts</title></head><body class='min-h-screen bg-gradient-to-br from-indigo-700 via-violet-700 to-fuchsia-700'><div class='min-h-screen flex items-center justify-center p-4'>{% block content %}{% endblock %}</div><script>function togglePassword(id){const el=document.getElementById(id);el.type=el.type==='password'?'text':'password'} function loadingBtn(formId,btnId){const f=document.getElementById(formId);if(!f)return;f.addEventListener('submit',()=>{const b=document.getElementById(btnId);b.disabled=true;b.innerText='Please wait...';})}</script></body></html>
